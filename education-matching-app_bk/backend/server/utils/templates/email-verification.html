<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メールアドレス認証</title>
</head>
<body style="font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'メイリオ', Meiryo, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; text-align: center; border-radius: 10px 10px 0 0;">
    <h1 style="color: white; margin: 0; font-size: 24px;">メールアドレス認証</h1>
  </div>
  
  <div style="background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px;">
    <p style="font-size: 16px; margin-bottom: 20px;">こんにちは{{userName}}様</p>
    
    <p style="font-size: 14px; margin-bottom: 20px;">
      Education Appにご登録いただき、ありがとうございます。
    </p>
    
    <p style="font-size: 14px; margin-bottom: 20px;">
      メールアドレスを確認するために、以下の認証コードを入力してください。
    </p>
    
    <div style="background: white; padding: 20px; border-radius: 8px; text-align: center; margin: 30px 0;">
      <div style="font-size: 12px; color: #666; margin-bottom: 10px;">認証コード</div>
      <div style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #667eea;">{{code}}</div>
    </div>
    
    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">
      このコードは<strong>10分間</strong>有効です。
    </p>
    
    <p style="font-size: 13px; color: #666;">
      もしこのリクエストに覚えがない場合は、このメールを無視してください。
    </p>
    
    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; color: #999; font-size: 12px;">
      <p>Education App チーム</p>
    </div>
  </div>
</body>
</html>

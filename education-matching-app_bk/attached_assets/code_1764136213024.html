</div>
</div>
<div class="flex flex-col">
<label class="mb-2 text-sm font-medium text-[#0d141b] dark:text-slate-300" for="password">パスワード</label>
<div class="relative flex w-full items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock</span>
<input class="form-input h-14 w-full flex-1 rounded-lg border border-[#cfdbe7] bg-white p-3.5 pl-12 pr-12 text-base text-[#0d141b] placeholder:text-[#4c739a] focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-slate-600 dark:bg-background-dark dark:text-white dark:placeholder-slate-400" id="password" placeholder="パスワードを入力" type="password" value=""/>
<button class="absolute right-4 text-[#4c739a] dark:text-slate-400" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>

<button class="flex h-14 w-full items-center justify-center rounded-lg bg-primary px-4 py-2 text-base font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
                    ログイン

<div class="relative flex items-center py-2">

<img alt="Apple logo" class="h-6 w-6 dark:invert" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_oFR_MEU-LNqWhGRlyfq0B79oK_OOj2dYEzbhSS7ZtSXyP25eohJIAvd7H-oaOrdjexXN1aYGKKsrAN86Se9XCk3r2N6DqSEPLCA8UmfWx3WbcgCRIsWjbPSONWZViMkAhzF6IwkYlBVm7PO0V7yY6-27cmZms9NRlA0QU-gV-P5z4UA691wpjxftLf5SgOSGeSscK_OO509TKUPzExqFk6Rqwf9iItfKkh2KgnmZ0DB1FWnmCdZ_ixnWkKNaNlit-AOi7_vnmxw"/>

<p class="text-center text-sm text-[#4c739a] dark:text-slate-400">

</p>
</div>
</div>

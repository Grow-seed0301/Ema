<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>購入プランの選択</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            "display": ["Manrope", "Hiragino Sans", "SF Pro Display", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center justify-between bg-background-light/80 p-4 pb-2 backdrop-blur-sm dark:bg-background-dark/80">
<div class="flex size-12 shrink-0 items-center text-[#0d141b] dark:text-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h1 class="flex-1 text-lg font-bold leading-tight tracking-[-0.015em] text-[#0d141b] dark:text-white">プランを選択</h1>
<div class="w-12"></div> <!-- Spacer for centering title -->
</div>
<!-- Segmented Buttons -->
<div class="px-4 py-3">
<div class="flex h-10 flex-1 items-center justify-center rounded-xl bg-[#e7edf3] p-1 dark:bg-slate-800">
<label class="flex h-full grow cursor-pointer items-center justify-center overflow-hidden rounded-lg px-2 text-sm font-medium leading-normal text-slate-500 has-[:checked]:bg-white has-[:checked]:text-primary has-[:checked]:shadow-sm dark:text-slate-400 dark:has-[:checked]:bg-slate-700 dark:has-[:checked]:text-white">
<span class="truncate">月額プラン</span>
<input checked="" class="invisible w-0" name="plan_type" type="radio" value="月額プラン"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center overflow-hidden rounded-lg px-2 text-sm font-medium leading-normal text-slate-500 has-[:checked]:bg-white has-[:checked]:text-primary has-[:checked]:shadow-sm dark:text-slate-400 dark:has-[:checked]:bg-slate-700 dark:has-[:checked]:text-white">
<span class="truncate">追加オプション</span>
<input class="invisible w-0" name="plan_type" type="radio" value="追加オプション"/>
</label>
</div>
</div>
<!-- Pricing Cards -->
<div class="grid grid-cols-1 gap-4 px-4 py-3">
<div class="flex flex-1 cursor-pointer flex-col gap-4 rounded-xl border border-solid border-slate-300 bg-white p-6 ring-2 ring-transparent transition-all hover:shadow-md has-[:checked]:border-primary has-[:checked]:ring-primary/30 dark:border-slate-700 dark:bg-slate-800/50 dark:has-[:checked]:border-primary">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-1">
<h2 class="text-base font-bold leading-tight text-slate-800 dark:text-white">ライトプラン</h2>
<p class="flex items-baseline gap-1 text-slate-900 dark:text-white">
<span class="text-4xl font-black leading-tight tracking-[-0.033em]">¥19,800</span>
<span class="text-base font-bold leading-tight text-slate-500 dark:text-slate-400">/月</span>
</p>
</div>
<input class="h-5 w-5 shrink-0 appearance-none rounded-full border-2 border-slate-300 bg-white checked:border-primary checked:bg-primary checked:ring-2 checked:ring-primary/30 dark:border-slate-600 dark:bg-slate-700" name="selected_plan" type="radio"/>
</div>
<div class="flex flex-col gap-2 border-t border-slate-200 pt-4 dark:border-slate-700">
<div class="flex gap-3 text-[13px] font-normal leading-normal text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-base text-primary">check_circle</span>
            月3回レッスン
        </div>
</div>
</div>
<div class="flex flex-1 cursor-pointer flex-col gap-4 rounded-xl border border-solid border-slate-300 bg-white p-6 ring-2 ring-transparent transition-all hover:shadow-md has-[:checked]:border-primary has-[:checked]:ring-primary/30 dark:border-slate-700 dark:bg-slate-800/50 dark:has-[:checked]:border-primary">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<h2 class="text-base font-bold leading-tight text-slate-800 dark:text-white">スタンダードプラン</h2>
<p class="rounded-full bg-primary/10 px-3 py-1 text-center text-xs font-medium leading-normal tracking-[0.015em] text-primary dark:bg-primary/20">一番人気</p>
</div>
<p class="flex items-baseline gap-1 text-slate-900 dark:text-white">
<span class="text-4xl font-black leading-tight tracking-[-0.033em]">¥27,500</span>
<span class="text-base font-bold leading-tight text-slate-500 dark:text-slate-400">/月</span>
</p>
</div>
<input checked="" class="h-5 w-5 shrink-0 appearance-none rounded-full border-2 border-slate-300 bg-white checked:border-primary checked:bg-primary checked:ring-2 checked:ring-primary/30 dark:border-slate-600 dark:bg-slate-700" name="selected_plan" type="radio"/>
</div>
<div class="flex flex-col gap-2 border-t border-slate-200 pt-4 dark:border-slate-700">
<div class="flex gap-3 text-[13px] font-normal leading-normal text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-base text-primary">check_circle</span>
          月5回レッスン
        </div>
</div>
</div>
<div class="flex flex-1 cursor-pointer flex-col gap-4 rounded-xl border border-solid border-slate-300 bg-white p-6 ring-2 ring-transparent transition-all hover:shadow-md has-[:checked]:border-primary has-[:checked]:ring-primary/30 dark:border-slate-700 dark:bg-slate-800/50 dark:has-[:checked]:border-primary">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-1">
<h2 class="text-base font-bold leading-tight text-slate-800 dark:text-white">プレミアムプラン</h2>
<p class="flex items-baseline gap-1 text-slate-900 dark:text-white">
<span class="text-4xl font-black leading-tight tracking-[-0.033em]">¥35,200</span>
<span class="text-base font-bold leading-tight text-slate-500 dark:text-slate-400">/月</span>
</p>
</div>
<input class="h-5 w-5 shrink-0 appearance-none rounded-full border-2 border-slate-300 bg-white checked:border-primary checked:bg-primary checked:ring-2 checked:ring-primary/30 dark:border-slate-600 dark:bg-slate-700" name="selected_plan" type="radio"/>
</div>
<div class="flex flex-col gap-2 border-t border-slate-200 pt-4 dark:border-slate-700">
<div class="flex gap-3 text-[13px] font-normal leading-normal text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-base text-primary">check_circle</span>
          月6回レッスン
        </div>
<div class="flex gap-3 text-[13px] font-normal leading-normal text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-base text-primary">check_circle</span>
          月1回教師レポート作成
        </div>
</div>
</div>
</div>
<div class="px-4 py-3">
<div class="space-y-4 rounded-xl bg-white p-4 dark:bg-slate-800/50">
<!-- Section Header -->
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] text-[#0d141b] dark:text-white">お支払い情報</h3>
<!-- List Item -->
<div class="flex min-h-14 items-center justify-between gap-4">
<div class="flex items-center gap-4">
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-[#e7edf3] text-[#0d141b] dark:bg-slate-700 dark:text-white">
<span class="material-symbols-outlined text-2xl">credit_card</span>
</div>
<p class="flex-1 truncate text-base font-normal leading-normal text-[#0d141b] dark:text-slate-200">支払い方法</p>
</div>
<div class="shrink-0">
<button class="flex items-center gap-1 text-base font-medium leading-normal text-primary">
<span>Visa **** 1234</span>
<span class="material-symbols-outlined text-xl">arrow_forward_ios</span>
</button>
</div>
</div>
<div class="flex items-center justify-between border-t border-slate-200 pt-4 dark:border-slate-700">
<p class="text-base font-bold text-slate-800 dark:text-white">合計金額</p>
<p class="text-2xl font-black text-slate-900 dark:text-white">¥27,500</p>
</div>
</div>
</div>
<div class="h-28"></div> <!-- Spacer for fixed button -->
<!-- Bottom CTA Section -->
<div class="fixed bottom-0 left-0 right-0 z-10 w-full border-t border-slate-200 bg-white/80 p-4 backdrop-blur-sm dark:border-slate-700 dark:bg-background-dark/80">
<button class="flex h-12 w-full min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary px-4 text-base font-bold leading-normal text-white shadow-lg shadow-primary/30 transition-transform active:scale-[0.98]">
<span class="truncate">この内容で決済する</span>
</button>
</div>
</div>
</body></html>

<!DOCTYPE html>
<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>振込申請画面</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006b70",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus {
            @apply focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<header class="sticky top-0 z-30 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60">
<div class="flex items-center px-4 py-3">
<div class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back_ios_new</span>
</div>
<h1 class="text-lg font-bold flex-1 text-center pr-10 text-slate-900 dark:text-slate-100">振込申請</h1>
</div>
</header>
<main class="pb-36">
<section class="p-4">
<div class="relative overflow-hidden rounded-3xl bg-primary p-6 shadow-xl shadow-primary/10">
<div class="relative z-10 flex flex-col items-center text-center">
<p class="text-white/80 text-xs font-bold uppercase tracking-widest mb-1">Available Balance</p>
<p class="text-white/70 text-sm font-medium">出金可能額</p>
<div class="flex items-baseline gap-1 mt-1">
<span class="text-white text-4xl font-extrabold tracking-tight">¥125,000</span>
</div>
</div>
<div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
<div class="absolute -left-8 -bottom-8 w-32 h-32 bg-black/10 rounded-full blur-2xl"></div>
</div>
</section>
<section class="px-4 py-2">
<div class="bg-white dark:bg-slate-900/50 rounded-2xl p-5 border border-slate-200/50 dark:border-slate-800/50 shadow-sm">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3" for="amount">
                    申請金額
                </label>
<div class="relative flex items-center mb-4">
<span class="absolute left-4 text-xl font-bold text-slate-400">¥</span>
<input class="w-full pl-10 pr-4 py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-xl font-extrabold text-slate-900 dark:text-white input-focus" id="amount" placeholder="0" type="number"/>
</div>
<button class="w-full py-3 px-4 rounded-xl border border-primary/20 bg-primary/5 text-primary text-sm font-bold hover:bg-primary/10 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">account_balance_wallet</span>
                    全額申請する
                </button>
</div>
</section>
<section class="px-4 mt-6">
<div class="flex items-center justify-between mb-3 px-1">
<h3 class="text-slate-900 dark:text-white text-sm font-bold">振込先口座情報</h3>
<button class="text-primary text-xs font-bold flex items-center gap-1">
                    変更
                    <span class="material-symbols-outlined text-xs">edit</span>
</button>
</div>
<div class="bg-white dark:bg-slate-900/50 rounded-2xl border border-slate-200/50 dark:border-slate-800/50 shadow-sm overflow-hidden">
<div class="divide-y divide-slate-100 dark:divide-slate-800">
<div class="flex justify-between p-4">
<span class="text-xs font-medium text-slate-500">銀行名</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">三菱UFJ銀行</span>
</div>
<div class="flex justify-between p-4">
<span class="text-xs font-medium text-slate-500">支店名</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">渋谷支店 (123)</span>
</div>
<div class="flex justify-between p-4">
<span class="text-xs font-medium text-slate-500">口座種別</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">普通</span>
</div>
<div class="flex justify-between p-4">
<span class="text-xs font-medium text-slate-500">口座番号</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">1234567</span>
</div>
<div class="flex justify-between p-4">
<span class="text-xs font-medium text-slate-500">名義</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">タナカ タロウ</span>
</div>
</div>
</div>
</section>
<section class="px-4 mt-6">
<div class="bg-slate-100 dark:bg-slate-800/40 rounded-2xl p-4 flex gap-3">
<span class="material-symbols-outlined text-slate-400 text-xl flex-shrink-0">info</span>
<div class="space-y-2">
<h4 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">注意事項</h4>
<ul class="text-xs text-slate-500 dark:text-slate-400 space-y-1.5 leading-relaxed">
<li>・振込手数料として一律 <span class="font-bold text-slate-700 dark:text-slate-200">¥250</span> が差し引かれます。</li>
<li>・申請後、通常 <span class="font-bold text-slate-700 dark:text-slate-200">3〜5営業日以内</span> に指定の口座へ振り込まれます。</li>
<li>・入力内容に誤りがある場合、組戻し手数料が発生することがあります。</li>
</ul>
</div>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 pb-10 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent z-40">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-xl shadow-primary/30 flex items-center justify-center gap-2 transition-all active:scale-[0.97]">
<span class="material-symbols-outlined">verified</span>
            申請内容を確定する
        </button>
</div>

</body></html>

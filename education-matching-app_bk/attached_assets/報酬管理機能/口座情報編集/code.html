<!DOCTYPE html>
<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>振込先口座情報の編集</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006b70",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus {
            @apply focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all;
        }
        input::placeholder {
            @apply text-slate-300 dark:text-slate-600 font-normal;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<header class="sticky top-0 z-30 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60">
<div class="flex items-center px-4 py-3">
<div class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back_ios_new</span>
</div>
<h1 class="text-lg font-bold flex-1 text-center pr-10 text-slate-900 dark:text-slate-100">口座情報の編集</h1>
</div>
</header>
<main class="pb-36 p-4">
<div class="max-w-md mx-auto space-y-6">
<div class="space-y-4">
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" for="bank_name">
                        銀行名
                    </label>
<input class="w-full px-4 py-3.5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-base font-medium text-slate-900 dark:text-white input-focus" id="bank_name" placeholder="例：三菱UFJ銀行" type="text" value="三菱UFJ銀行"/>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="col-span-2">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" for="branch_name">
                            支店名
                        </label>
<input class="w-full px-4 py-3.5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-base font-medium text-slate-900 dark:text-white input-focus" id="branch_name" placeholder="例：渋谷支店" type="text" value="渋谷支店"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" for="branch_code">
                            支店番号
                        </label>
<input class="w-full px-4 py-3.5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-base font-medium text-slate-900 dark:text-white text-center input-focus" id="branch_code" placeholder="123" type="number" value="123"/>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">
                        口座種別
                    </label>
<div class="grid grid-cols-2 gap-3">
<label class="relative flex items-center justify-center p-3.5 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer">
<input checked="" class="sr-only" name="account_type" type="radio" value="1"/>
<span class="text-sm font-bold text-primary">普通</span>
</label>
<label class="relative flex items-center justify-center p-3.5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 cursor-pointer">
<input class="sr-only" name="account_type" type="radio" value="2"/>
<span class="text-sm font-bold text-slate-500 dark:text-slate-400">当座</span>
</label>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" for="account_number">
                        口座番号
                    </label>
<input class="w-full px-4 py-3.5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-base font-medium tracking-widest text-slate-900 dark:text-white input-focus" id="account_number" placeholder="7桁の数字を入力" type="number" value="1234567"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2" for="account_holder">
                        口座名義（カナ）
                    </label>
<input class="w-full px-4 py-3.5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl text-base font-medium text-slate-900 dark:text-white input-focus" id="account_holder" placeholder="例：タナカ タロウ" type="text" value="タナカ タロウ"/>
<p class="mt-2 text-[10px] text-slate-400 flex items-center gap-1">
<span class="material-symbols-outlined text-xs">info</span>
                        全角カタカナで入力してください。
                    </p>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800/40 rounded-2xl p-4 flex gap-3">
<span class="material-symbols-outlined text-slate-400 text-xl flex-shrink-0">shield</span>
<div class="space-y-1">
<h4 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">セキュリティ</h4>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                        入力された口座情報は暗号化され、安全に管理されます。報酬の振込以外の目的で使用されることはありません。
                    </p>
</div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 pb-10 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent z-40">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-xl shadow-primary/30 flex items-center justify-center gap-2 transition-all active:scale-[0.97]">
<span class="material-symbols-outlined">save</span>
            変更内容を保存する
        </button>
</div>

</body></html>

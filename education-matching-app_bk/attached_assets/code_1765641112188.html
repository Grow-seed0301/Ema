<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>予約完了画面</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#197fe6",
              "background-light": "#f6f7f8",
              "background-dark": "#111921",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<button class="text-slate-800 dark:text-slate-200 flex size-10 shrink-0 items-center justify-center rounded-full">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-50 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">予約完了</h2>
</div>
<main class="flex flex-col w-full grow px-4 sm:px-6 py-8">
<div class="flex flex-col items-center text-center">
<!-- Status Indicator -->
<div class="flex size-20 items-center justify-center rounded-full bg-green-500/10 mb-6">
<div class="flex size-14 items-center justify-center rounded-full bg-green-500/20">
<span class="material-symbols-outlined text-4xl text-green-500">check</span>
</div>
</div>
<!-- Headline Text -->
<h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-2xl font-bold leading-tight pb-2">予約が完了しました</h1>
<!-- Body Text -->
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal max-w-md">レッスンの予約が正常に完了しました。詳細は下記をご確認ください。</p>
</div>
<!-- Booking Summary Card -->
<div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-sm mt-8 p-5 w-full max-w-lg mx-auto">
<h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">予約内容</h3>
<!-- List Item (Teacher) -->
<div class="flex items-center gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-14 w-14 shrink-0" data-alt="Portrait of Kei Tanaka" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDSPe70z9_9ueX2PuNs1cWFocrPINaTjjdjDAB9vcehyArDNgnK9pwdZyTV0NUEUPhReObMZkuBzP5G1RI35aIOxF5gH6yf5icfqu5ZovmZ67A5XdTULp-17YWH8TqoFXQ5ZXNvGdf7kZVhBXIExfWeIBMmtJ2o4gb_Er1DFiHkR1oZ9ErXPy5bDFCDhLU9_u_ftViDC15vNmncBDdQaGQaojUXCbm8Uz5TbcvzVLmik-pGeV5RKun0YgFVSYYJygayXsbitCTT4A");'></div>
<div class="flex flex-col justify-center">
<p class="text-slate-900 dark:text-slate-50 text-base font-medium leading-normal line-clamp-1">田中 圭 先生</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal line-clamp-2">英会話初級レッスン</p>
</div>
</div>
<hr class="my-4 border-slate-200 dark:border-slate-700"/>
<!-- Details List -->
<div class="space-y-3 text-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-xl">calendar_today</span>
<p class="text-slate-700 dark:text-slate-300">2023年10月28日 (土) 15:00 - 15:50</p>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-xl">videocam</span>
<p class="text-slate-700 dark:text-slate-300">オンライン (Zoom)</p>
</div>
</div>
</div>
<div class="flex-grow"></div>
<!-- CTAs -->
<div class="mt-10 pt-4 pb-2 w-full max-w-lg mx-auto space-y-3">
<button class="bg-primary text-white font-bold h-12 w-full rounded-xl flex items-center justify-center transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50">
                    ホームに戻る
                </button>
<button class="bg-transparent text-primary dark:text-primary font-bold h-12 w-full rounded-xl flex items-center justify-center transition-colors hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-primary/50">
                    授業履歴を確認する
                </button>
</div>
</main>
</div>
</body></html>
